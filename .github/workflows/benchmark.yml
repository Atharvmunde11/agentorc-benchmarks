name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Run quick benchmarks
        run: npm run benchmark:quick

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentorc-benchmark-results
          path: |
            results/benchmark.md
            results/benchmark.json
            results/charts/
          retention-days: 30
